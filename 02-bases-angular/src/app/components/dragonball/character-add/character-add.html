<h3>Agregar: {{ inputName() }} - {{ inputPower() }}</h3>

<input
  [value]="inputName()"
  (input)="inputName.set(txtName.value)"
  #txtName
  type="text"
  class="form-control"
  placeholder="nombre"
/>

<input
  [value]="inputPower()"
  (input)="inputPower.set(+numberPower.value)"
  #numberPower
  type="number"
  class="form-control mt-2"
  placeholder="poder"
/>

<button (click)="addCharacter()" class="btn btn-primary mt-2">
  Agregar
</button>
