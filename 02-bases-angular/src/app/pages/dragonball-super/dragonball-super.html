<h1>DragonBall Page</h1>
<hr>

<section class="row">
  <div class="col-12 col-sm-6">
    <dragonball-character-add
      [characters]="characters()"
      (newCharacter)="addCharacter($event)"
    />
  </div>

  <div class="col-12 col-sm-6">
    <dragonball-character-list
      [nameList]="'Personajes de DragonBall súper'"
      [characters]="characters()"
    />
  </div>
</section>
